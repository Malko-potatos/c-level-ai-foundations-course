services:
  - type: web
    name: c-level-ai-survey
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SURVEY_TO_EMAIL
        sync: false
      - key: SURVEY_FROM_EMAIL
        sync: false
